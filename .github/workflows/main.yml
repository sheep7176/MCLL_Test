name: Test Mac Installer

on:
  push:
    paths:
      - 'MCLL_Mac_Installer.sh'
  workflow_dispatch:

jobs:
  test-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: |
          git lfs install
          git lfs pull

      - name: Verify file is not LFS pointer
        run: |
          file MCLL_Mac_Installer.sh
          head -c 100 MCLL_Mac_Installer.sh | xxd

      - name: Make script executable
        run: chmod +x MCLL_Mac_Installer.sh

      - name: Run installer (dry run)
        run: |
          echo -e "y\n$(pwd)/test_install" | ./MCLL_Mac_Installer.sh

      - name: Verify installation
        run: |
          echo "=== Checking installed files ==="
          ls -la test_install
          ls -la test_install/HMCL || echo "HMCL not found"
          ls -la test_install/PrismLauncher || echo "PrismLauncher not found"
          ls -la test_install/MultiMC || echo "MultiMC not found"
          ls -la test_install/java || echo "Java not found"
          echo "=== Checking desktop shortcuts ==="
          ls -la ~/Desktop/*.desktop || echo "No desktop shortcuts found"
          echo "All tests passed!"